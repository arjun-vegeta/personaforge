# This is a sample workflow that runs PersonaForge tests using local SQLite
# You can trigger this manually from the Actions tab on GitHub.
name: PersonaForge Manual CI

on:
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  run-voice-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install pytest mock library for test support
        pip install pytest-mock

    - name: Run PersonaForge CI Gates
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        # Set to "false" to run actual voice calls against ElevenLabs, or "true" for mock simulation
        PERSONAFORGE_CI_DRY_RUN: "true"
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        # Initialize project layout and folders
        python3 personaforge/backend/app/cli/main.py init
        # Run CI quality gates check using local SQLite
        python3 personaforge/backend/app/cli/main.py ci --scenario scenarios/telecom_refund.yaml
