# Sample GitHub Actions Workflow for PersonaForge
# Copy this file to your repository at: .github/workflows/personaforge-ci.yml

name: Voice Agent Reliability Gates

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  personaforge-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Installs PersonaForge and its dependencies
        pip install personaforge

    - name: Run Quality Gate Checks
      env:
        # Secure credentials configured in GitHub Repository Secrets
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        
        # Set this to "true" to run simulated scenarios without API costs.
        # Set to "false" or remove to run live calls against ElevenLabs.
        PERSONAFORGE_CI_DRY_RUN: "true"
      run: |
        # Set the python path to include the current directory
        export PYTHONPATH=$PYTHONPATH:.
        
        # Initialize project directories if not already created
        python3 -m personaforge.backend.app.cli.main init
        
        # Run CI gates check against your scenario configuration
        # Replace the scenario file path with your own config file
        python3 -m personaforge.backend.app.cli.main ci --scenario scenarios/telecom_refund.yaml
